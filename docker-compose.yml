version: '3.8'

services:
  redis:
    image: redis:7.2
    container_name: stayhub-redis
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:3.0
    container_name: stayhub-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5