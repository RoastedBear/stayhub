spring:
  datasource:
    url: jdbc:mysql://localhost:3306/stayhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

server:
  port: 8080

jwt:
  # HS256 서명 키 (Base64 인코딩, 256bit 이상 필수)
  # 운영 환경에서는 환경변수 JWT_SECRET로 반드시 교체할 것
  secret: ${JWT_SECRET:c3RheWh1Yi1qd3Qtc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmctZm9yLUhNQUMtU0hBMjU2IQ==}
  access-token-expiry: 3600000      # 1시간 (ms)
  refresh-token-expiry: 1209600000  # 14일 (ms)

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET:stayhub}
      endpoint: ${S3_ENDPOINT:http://localhost:4566}
      region: ${AWS_REGION:us-east-1}
    credentials:
      access-key: ${AWS_ACCESS_KEY:test}
      secret-key: ${AWS_SECRET_KEY:test}

toss:
  payments:
    # 운영 환경에서는 환경변수 TOSS_SECRET_KEY로 반드시 교체할 것
    secret-key: ${TOSS_SECRET_KEY:test_sk_dummy1234567890abcdefghijklmnop}
    base-url: https://api.tosspayments.com